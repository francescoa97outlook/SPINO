name: Docs

# Sanity build of the Sphinx documentation on every push/PR. Hosting/deployment
# is handled by Read the Docs (see .readthedocs.yaml); this job just makes sure
# the docs still build (including the sphinx-apidoc step in build_docs.sh) so a
# broken build is caught before merge.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system Tk (imported by the GUI modules)
        run: sudo apt-get update && sudo apt-get install -y python3-tk

      - name: Install the package (so autodoc can import spino)
        run: python -m pip install --upgrade pip .

      - name: Build docs via build_docs.sh
        run: |
          chmod +x build_docs.sh
          ./build_docs.sh

      - name: Upload built docs
        uses: actions/upload-artifact@v4
        with:
          name: html-docs
          path: docs/build/html
